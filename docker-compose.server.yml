services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: neongambit-api
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL}
      ENFORCE_HTTPS: ${ENFORCE_HTTPS:-false}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-120}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
